### Basic configuration

# --------------------------- start ---------------------------
# Site information
# 网站信息
site:
  name:
    class: text # text / i_class / img
    custom: PlanB曲线 # Solitude / fas fa-ghost / /img/pwa/favicon.ico
  icon: /img/site-logo.png # Site icon / 网站图标
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Navigation bar
# 导航栏
nav:
  # Left Box
  # 左侧盒子
  group:
    成长:
      技能学习: /skill-tree/ || /img/技能树.png # name: url || icon
    工具与资源:
      GitHub项目: /categories/开源项目分享/ || /img/开发.png # name: url || icon
      工具分享: /tags/自动化/ || /img/工具分享.png # name: url || icon
      导航站: /nav/ || /img/导航站.png # name: url || icon

  # Menu
  # 菜单
  menu:
    首页: /
    模型API: https://api.mingder.space/
    内容归档:
      归档: /archives/ || fas fa-folder-closed
      分类: /categories/ || fas fa-clone
      标签: /tags/ || fas fa-tags

  # Right button
  # 右侧按钮
  right:
    random: false # Random article / 随机文章按钮
    custom:
    #  - name: 开往 # 名字
    #    url: https://www.travellings.cn/go.html # 跳转链接
    #    icon: fas fa-train # 图标
    #    onclick: # 点击事件
    #    id: travellings_button # id
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Home Top Banner
# 首页顶部
hometop:
  enable: true
  banner:
    title: 跨越已知曲线<br>拥抱无限可能 # 大字
    desc:
      - 在熟悉的世界里，找到崭新的上升弧线。
      - 不止于职场转身，更是人生的再次启程。
      - 每一次主动跨界，都是一次优雅的跃迁。
    icon:
      OpenAI:
        img: /img/brands/openai.svg
        color: "#111827"
      Claude:
        img: /img/brands/anthropic.svg
        color: "#C26A3D"
      Gemini:
        img: /img/brands/gemini.svg
        color: "#4F7CFE"
      DeepSeek:
        img: /img/brands/deepseek.svg
        color: "#4D6BFE"
      GitHub:
        img: /img/brands/github.svg
        color: "#24292F"
      通义千问:
        img: /img/brands/qwen.svg
        color: "#7A5AF8"
  group:
    热门: /tags/热门 || fas fa-seedling || linear-gradient(to right,#7b2ff7,#b06ab3)
    视频: /nav/ || fas fa-compass || linear-gradient(to right,#247ba0,#70c1b3)
    图集: /tags/自动化/ || fas fa-arrow-trend-up || linear-gradient(to right,#ff8a00,#ffb347)
    随笔: /tags/自动化/ || fas fa-pen-nib || linear-gradient(to right,#f43f5e,#fb7185)
  recommendList:
    enable: true
    sup: 传奇由此落笔
    title: 目标无尽星海
    url: /
    img: /img/推荐页.png
    color: "none"
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Aside
# 侧边栏
aside:
  # Values: about (info card), newestPost (latest article), allInfo (website information), newest_comment (latest comment)
  # 值: about(信息卡), newestPost(最新文章), allInfo(网站信息), newest_comment(最新评论), reward(打赏)

  # Sticky: Fixed position / noSticky: Not fixed position
  # Sticky: 固定位置 / noSticky: 不固定位置
  home: # on the homepage
    noSticky: "about"
    Sticky: "reward,allInfo"
  post: # on the article page
    noSticky: "about"
    Sticky: "reward,newestPost"
  page: # on the page
    noSticky: "about"
    Sticky: "newestPost,allInfo"
  # 菜单栏位置(0: 左 1: 右)
  position: 1 # Sidebar positioning(0: left 1: right)

  # --------------------------- start ---------------------------
  # Information card
  # 信息卡
  my_card:
    author:
      img: /img/logo.png # url
      sticker: # url, 24x24 size
    # 介绍 / Introduction
    description: 记录成长跃迁、工具探索与人生转向的每一次曲线变化。
    # 内容 / Content
    content: 这里持续更新技能学习、工具资源、跨界实践与新的可能性。
    state:
      morning: ✨ 早上好，新的一天开始了
      noon: 🍲 午餐时间
      afternoon: 🌞 下午好
      night: 早点休息
      goodnight: 晚安 😴
    witty_words:
      # - 你可以的
      # - 你一定可以的
      # - 祝你好运，陌生人
    # social
    # 社交信息图标
    information:
      GitHub: https://github.com/Mumu615 || fab fa-github
      小红书: https://www.xiaohongshu.com/user/profile/6470d70f000000001003727b || fa-solid fa-book
      #归档: /archives/ || fas fa-box-archive
      #分类: /categories/ || fas fa-folder-tree
  # --------------------------- end ---------------------------

  # --------------------------- start ---------------------------
  # article table of contents
  # 文章目录
  toc:
    post: true
    page: false
    vague: true
  # --------------------------- end ---------------------------

  # --------------------------- start ---------------------------
  # Tags
  # 标签
  tags:
    enable: true
    limit: 15 # Number of tags displayed
    # Highlighted tags
    highlight_list:
      - GitHub
  # --------------------------- end ---------------------------

  # --------------------------- start ---------------------------
  # Site Info
  # 网站信息
  siteinfo:
    # Number of articles
    # 文章数量
    postcount: true
    # Total number of words
    # 总字数
    wordcount: false
    # PV
    pv: true
    # UV
    uv: true
    # Last update date
    # 最后更新日期
    updatetime: true
    # Website creation time
    # 网站创建时间
    runtimeenable: true
    # Format: yyyy-MM-dd hh-mm-ss
    # 格式: yyyy-MM-dd hh-mm-ss
    runtime: "2026-05-2 00:00:00"
  # --------------------------- end ---------------------------
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Page default settings
# 页面默认设置
page:
  # 404 page
  # 404 页面
  error: true
  # Tags page
  # 标签页面
  tags: true
  # Categories page
  # 分类页面
  categories: true
  # list: Sort List / 1: Follow HomeList
  # list: 排序列表 / 1: 跟随首页列表
  archives: 0
  # Default value
  # 默认值
  default:
    # Default image when no cover is set
    # 未设置封面时的默认图片
    cover:
      - /img/default.avif # 默认图片 / default cover
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Post default settings
# 文章默认设置
post:
  default:
    # Default image when no cover is set
    # 未设置封面时的默认图片
    cover:
      - /img/default.avif # 默认图片 / default cover
    # Location
    # 位置
    locate: China
    # Copyright
    # 版权
    copyright:
      enable: true
      author: /img/logo.png # url
      # License
      # 许可证
      license: CC BY-NC-SA 4.0
      # License link
      # 许可证链接
      licenurl: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh-hans
  # Article Local AI
  # 文章本地AI
  ai:
    enable: false
    modelName: 小七 GPT
  # Article meta information
  # 文章元信息
  meta:
    # Release date
    # 发布日期
    date: true
    # Update date
    # 更新日期
    updated: true
    # Location
    # 位置
    locate: false
    # Number of words
    # 字数
    wordcount: true
    # uv
    readtime: true
    # pv
    pv: false
    # Comment count
    # 评论数
    comment: false
  # Reward
  # 打赏
  award:
    enable: true
    appreciators: /about/ # Reward page
    # Reward Title
    # 打赏标题
    title: 感谢你的支持
    desc: 如果这篇文章对你有帮助，欢迎请我喝杯咖啡。
    # Reward list
    # 打赏列表
    list:
      - name: 微信
        qcode: /img/微信.png
        url: /img/微信.png
        color: '#07c160'
      - name: 支付宝
        qcode: /img/支付宝.png
        url: /img/支付宝.png
        color: '#1677ff'

  # Share icon
  # 分享图标
  share:
    enable: true
    list:
       - qq
      # - weibo
      # - twitter
      # - facebook
      # - telegram
      # - whatsapp
      # - linkedin
       - link
       - qrcode
  # Article reading progress
  # 文章封面取色
  covercolor:
    enable: false
    # local: local color / api: api color / ave: oss average color
    mode: local
    # api address / api 地址
    api: https://api.qjqq.cn/api/Imgcolor?img=
    # Storage / 缓存时间
    time: 43200000
  footer:
    enable: true
    desc: 这篇内容来自 PlanB曲线，持续分享 AI 工具、开源项目与自动化实践。
    button: # Button
      enable: true
      name: 查看更多文章
      url: /archives/
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Custom Theme Color
theme_color:
  dark: "#ffc848" # dark
  light: "#425AEF" # light
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# display mode
# 显示模式
display_mode:
  # auto: automatic switching(Recognize the current theme mode of the device) / dark: dark mode / light: light mode
  # auto: 自动切换（识别设备当前主题模式） / dark: 深色模式 / light: 浅色模式
  type: auto
  # After opening, the dark mode will display the starry sky background
  # 开启后深色模式会显示星空背景
  universe: false
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Font
# 字体
font:
  font-size: 16px
  code-font-size: 16px
  # Global font
  # 全局字体
  font-family: "PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
  # Code font
  # 代码字体
  code-font-family: '"monospace", monospace'
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Lure
# When the user exits the page, modify the title
# 当用户退出页面时，修改标题
lure:
  enable: false
  jump: 404 Not Found
  back: ヾ(≧∇≦*)ゝHey, hey, you fell for it.
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Article expiration
# 文章过期
expire:
  enable: false
  time: 30 # days
  position: top # top / bottom
  text_prev: "This article expired "
  text_next: " day ago, if the content does not match, please contact the webmaster to update it."
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Home page article configuration information
# 首页文章配置信息
index_post_list:
  direction: column # row / column
  column: 2 # 2: 2 columns 3: 3 columns
  cover: both
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Related articles
# 相关文章
related_post:
  enable: false
  limit: 2
  # created: release date / updated: update date
  # created: 发布日期 / updated: 更新日期
  date_type: created
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Custom right menu
# 自定义右键菜单
right_menu:
  enable: true
  # Whether to display the hot comment switch.
  # 是否显示热门评论开关
  commentBarrage: true
  # Whether to display the browser's context menu when hold Ctrl key.
  # 是否在按住 Ctrl 键时显示浏览器右键菜单
  ctrlOriginalMenu: true
  # Simplified and Traditional Chinese translation.
  # 简繁体转换
  translate: true
  # Custom list
  # 自定义列表
  custom_list:
    # - name: 随机文章
    #   click: toRandomPost()
    #   id: menu-randomPost
    #   class:
    #   icon: fas fa-tower-broadcast
    # - name: 全部分类
    #   click: pjax.loadUrl('/categories/') # External links with window.open, pjax can not request cross-domain content.
    #   id:
    #   class:
    #   icon: fas fa-clone
    # - name: 全部标签
    #   click: pjax.loadUrl('/tags/')
    #   id:
    #   class:
    #   icon: fas fa-tags
# --------------------------- end -----------------------

# --------------------------- start ---------------------------
# Copy
#  information
# 复制信息
copy:
  enable: false
  # Turn on Link copyright information after copying.
  # 复制后链接版权信息
  copyright:
    enable: false
    # Display when the number of words copied exceeds
    # 复制文字时超过多少字数显示
    limit: 50
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Mermaid
mermaid: false
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Chart.js
chart: false
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# typeit
typeit: false
# --------------------------- end ---------------------------

### Extended configuration

# --------------------------- start ---------------------------
# Console
# 控制台
console:
  enable: true
  # Recent comments
  # 最新评论
  recentComment:
    enable: false
    # Cache time 1: 1 day / .5 : half a day
    # 缓存时间 1: 1天 / .5 : 半天
    storage: .2
  card:
    # Tags
    # 标签
    tags: true
    # Archives
    # 归档
    archive: "month" # month: by month / year: by year
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
translate:
  enable: true
  defaultEncoding: 2 # 1: 默认繁体 2: 默认简体
  translateDelay: 0 # 首次加载翻译迟疑时间
# --------------------------- end ---------------------------

# --------------------------- start ---------------------------
# Right-Sidebar
